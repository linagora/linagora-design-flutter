name: linagora_design_flutter
description: Common widgets for Linagora products
version: 0.2.0
# Remove this later when publishing to pub.dev.
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  auto_size_text: ^3.0.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  photo_manager: ^3.0.0-dev.2
  photo_manager_image_provider: ^2.1.0
  permission_handler: ^12.0.1
  flutter_keyboard_visibility: ^6.0.0
  flutter_svg: ^2.1.0
  vector_graphics: ^1.1.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your package, add an assets section, like this:
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: TwakeInter
      fonts:
        - asset: assets/fonts/TwakeInter.ttf
        - asset: assets/fonts/TwakeInter-Regular.ttf
          weight: 400
        - asset: assets/fonts/TwakeInter-Medium.ttf
          weight: 500
        - asset: assets/fonts/TwakeInter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/TwakeInter-Bold.ttf
          weight: 700
